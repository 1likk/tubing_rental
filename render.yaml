databases:
  - name: tubing-rental-db
    databaseName: tubing_rental
    user: tubing_rental
    plan: free

services:
  - type: web
    name: tubing-rental
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn tubing_rental.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tubing-rental-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
